# Cloud macOS build for the 147 Pro native PoC — no Mac required.
# Codemagic compiles + signs the iOS app and ships it to TestFlight, where it
# installs OTA on the iPhone 11 Pro / 14 Pro Max.
#
# One-time setup in the Codemagic UI (I'll walk you through it):
#   1. Add your App Store Connect API key as an integration named exactly: pro147_asc
#   2. Register bundle id com.pro147.poc (Codemagic auto-manages signing with the key).
workflows:
  # Cheap compile check — no Apple account / signing needed. Use this first to
  # shake out Swift/HaishinKit API errors before spending minutes on signing.
  ios-compile:
    name: iOS compile check (no signing)
    max_build_duration: 45
    instance_type: mac_mini_m2
    environment:
      node: 20
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install npm dependencies
        script: npm ci
      - name: Capacitor sync (iOS)
        script: npx cap sync ios
      - name: Pod install
        script: |
          cd ios/App && pod install
      - name: Compile (no code signing)
        script: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            build \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO
    artifacts:
      - /tmp/xcodebuild_logs/*.log

  ios-poc:
    name: 147 Pro Native PoC (iOS)
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: pro147_asc
    environment:
      # NOTE: no `ios_signing` block on purpose — that triggers Codemagic's
      # automatic profile *fetch* at build start, which fails ("no matching
      # profiles") because none exist yet. Instead we create them in the
      # "Set up code signing" script below via the ASC API key (--create).
      groups:
        - signing   # provides CERTIFICATE_PRIVATE_KEY (our own signing key)
      vars:
        BUNDLE_ID: "com.pro147.poc"
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
      node: 20
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install npm dependencies
        script: npm ci
      - name: Capacitor sync (iOS)
        script: npx cap sync ios
      - name: Pod install
        script: |
          cd ios/App && pod install
      - name: Set up code signing
        script: |
          keychain initialize
          # Create the distribution certificate + App Store provisioning profile
          # for this bundle id via the App Store Connect API key (--create makes
          # them if they don't exist yet), then wire them into the Xcode project.
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key=@env:CERTIFICATE_PRIVATE_KEY \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Set build number
        script: |
          # Epoch seconds as CFBundleVersion — always unique and increasing, so
          # every upload is accepted. PlistBuddy sets it directly on the Info.plist
          # (the earlier agvtool/get-latest approach left it at "1" → duplicate).
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $(date +%s)" ios/App/App/Info.plist
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true

  # Android debug APK — installs directly on the OnePlus Nord 3 (sideload). Gradle
  # auto-signs with the debug keystore, so NO Play Console / signing setup is needed
  # to test. Download app-debug.apk from the build artifacts and open it on the phone
  # (enable "install unknown apps" for your browser/files app). This build also
  # doubles as the compile check that surfaces any RootEncoder/Kotlin API errors.
  android-apk:
    name: 147 Pro Native (Android debug APK)
    max_build_duration: 45
    # mac_mini_m2 is Codemagic's FREE-tier instance (same one the iOS workflows use).
    # Linux/Windows instances need a paid plan. Codemagic's mac images ship the
    # Android SDK + Gradle, so Android builds fine here at no cost.
    instance_type: mac_mini_m2
    environment:
      node: 20
      java: 17
    scripts:
      - name: Install npm dependencies
        script: npm ci
      - name: Capacitor sync (Android)
        script: npx cap sync android
      - name: Build debug APK
        script: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug --stacktrace
    artifacts:
      - android/app/build/outputs/apk/**/*.apk
